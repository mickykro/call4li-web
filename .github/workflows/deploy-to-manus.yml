name: Deploy to Manus

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build project
        run: npm run build
        
      - name: Trigger Manus deployment
        run: |
          # Manus will automatically detect the push and deploy
          # This workflow ensures the build is successful before deployment
          echo "✅ Build successful! Manus will auto-deploy on push."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
