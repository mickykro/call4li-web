name: Deploy to Manus

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          
      - name: Install dependencies
        run: npm install
        
      - name: Build project
        run: npm run build
        
      - name: Deploy to Manus
        run: |
          curl -X POST https://api.manus.im/projects/call4li-landing/deploy \
            -H "Authorization: Bearer ${{ secrets.git_update }}" \
            -H "Content-Type: application/json" \
            -d '{
              "branch": "main",
              "message": "Auto-deploy from GitHub Actions"
            }'
        env:
          MANUS_API_KEY: ${{ secrets.git_update }}
